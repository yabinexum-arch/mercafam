<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="MF Licencias"/>
<meta name="theme-color" content="#060d1a"/>
<link id="pwa-manifest-gen" rel="manifest"/>
<title>MercaFam — Licencias</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:#060d1a;color:#e8f0ff;
  font-family:'Segoe UI',sans-serif;
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:20px;
}
.card{
  background:#0d1829;
  border:1px solid #1e3050;
  border-radius:20px;
  padding:32px 28px;
  width:100%;max-width:420px;
  box-shadow:0 20px 60px rgba(0,0,0,.6);
}
.logo{
  display:flex;align-items:center;gap:12px;
  margin-bottom:8px;
}
.logo-icon{
  width:48px;height:48px;
  background:linear-gradient(135deg,#0a4a9e,#3b9eff);
  border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;
}
.logo-title{font-size:18px;font-weight:700;color:#e8f0ff;}
.logo-sub{font-size:11px;color:#4d6a8a;margin-top:2px;}
.badge{
  display:inline-block;background:rgba(248,81,73,.12);
  border:1px solid rgba(248,81,73,.3);
  color:#ff4d6a;font-size:10px;font-weight:700;
  padding:3px 10px;border-radius:20px;
  margin-bottom:24px;margin-top:8px;
  letter-spacing:.5px;text-transform:uppercase;
}
.field{margin-bottom:16px;}
.field label{
  display:block;font-size:11px;font-weight:600;
  color:#4d6a8a;text-transform:uppercase;
  letter-spacing:.8px;margin-bottom:8px;
}
.field input{
  width:100%;background:#060d1a;
  border:1.5px solid #1e3050;color:#e8f0ff;
  padding:12px 14px;border-radius:10px;
  font-size:15px;outline:none;
  transition:border .15s;
}
.field input:focus{border-color:#3b9eff;}
.field input::placeholder{color:#2d4a6a;}
.btn{
  width:100%;padding:14px;
  background:linear-gradient(180deg,#1a6fd4,#0a4a9e);
  border:none;border-radius:12px;
  color:#fff;font-size:15px;font-weight:700;
  cursor:pointer;transition:opacity .15s;
  margin-bottom:16px;
}
.btn:active{opacity:.85;}
.result{
  background:#060d1a;
  border:1.5px solid #1e3050;
  border-radius:12px;padding:16px;
  display:none;
}
.result.show{display:block;}
.result-label{
  font-size:10px;font-weight:700;color:#4d6a8a;
  text-transform:uppercase;letter-spacing:.8px;
  margin-bottom:8px;
}
.result-code{
  font-family:'Courier New',monospace;
  font-size:22px;font-weight:700;
  color:#3b9eff;letter-spacing:2px;
  margin-bottom:12px;
}
.result-phone{
  font-size:12px;color:#8fa8cc;
  margin-bottom:14px;
}
.copy-btn{
  width:100%;padding:10px;
  background:rgba(59,158,255,.12);
  border:1px solid rgba(59,158,255,.3);
  color:#3b9eff;border-radius:8px;
  font-size:13px;font-weight:600;
  cursor:pointer;transition:all .15s;
  margin-bottom:8px;
}
.copy-btn:active{background:rgba(59,158,255,.2);}
.wa-btn{
  width:100%;padding:10px;
  background:rgba(37,211,102,.1);
  border:1px solid rgba(37,211,102,.3);
  color:#25d366;border-radius:8px;
  font-size:13px;font-weight:600;
  cursor:pointer;transition:all .15s;
  text-decoration:none;display:block;
  text-align:center;
}
.wa-btn:active{background:rgba(37,211,102,.2);}
.divider{
  height:1px;background:#1e3050;
  margin:20px 0;
}
.history{margin-top:4px;}
.history-title{
  font-size:11px;font-weight:600;color:#4d6a8a;
  text-transform:uppercase;letter-spacing:.8px;
  margin-bottom:10px;
}
.hist-item{
  background:#060d1a;border:1px solid #132035;
  border-radius:8px;padding:10px 12px;
  margin-bottom:6px;display:flex;
  justify-content:space-between;align-items:center;
}
.hist-phone{font-size:13px;color:#8fa8cc;}
.hist-code{font-family:'Courier New',monospace;font-size:12px;color:#3b9eff;}
.hist-del{
  background:none;border:none;color:#4d6a8a;
  cursor:pointer;font-size:14px;padding:2px 6px;
  border-radius:4px;
}
.hist-del:hover{color:#ff4d6a;}
.empty{font-size:12px;color:#2d4a6a;text-align:center;padding:8px 0;}

/* ── INSTALAR BTN ── */
#install-bar{
  display:none;
  background:rgba(34,212,138,.08);
  border:1px solid rgba(34,212,138,.25);
  border-radius:12px;padding:12px 14px;
  margin-bottom:20px;
  align-items:center;gap:12px;
}
#install-bar.show{display:flex;}
#install-bar span{flex:1;font-size:13px;color:#22d48a;}
#install-bar button{
  background:linear-gradient(135deg,#065f46,#22d48a);
  border:none;border-radius:8px;
  color:#fff;font-size:12px;font-weight:700;
  padding:8px 14px;cursor:pointer;
  white-space:nowrap;
}

</style>
</head>
<body>
<div class="card">

  <div class="logo">
    <div class="logo-icon">🛒</div>
    <div>
      <div class="logo-title">MercaFam Pro</div>
      <div class="logo-sub">Panel de licencias</div>
    </div>
  </div>
  
  <div id="install-bar">
    <span>📲 Instala como app para acceso rápido</span>
    <button onclick="instalarApp()">Instalar</button>
  </div>

  <div class="badge">🔒 Herramienta privada — no compartir</div>

  <div class="field">
    <label>Número de celular del cliente</label>
    <input type="tel" id="phone-input" placeholder="Ej: 3001234567"
      maxlength="10" oninput="this.value=this.value.replace(/[^0-9]/g,'')"
      onkeydown="if(event.key==='Enter')generarCodigo()" />
  </div>

  <button class="btn" onclick="generarCodigo()">⚡ Generar código</button>

  <div class="result" id="result-box">
    <div class="result-label">Código generado para:</div>
    <div class="result-phone" id="res-phone"></div>
    <div class="result-code" id="res-code"></div>
    <button class="copy-btn" onclick="copiarCodigo()">📋 Copiar código</button>
    <a class="wa-btn" id="wa-link" href="#" target="_blank">
      💬 Enviar por WhatsApp
    </a>
  </div>

  <div class="divider"></div>

  <div class="history">
    <div class="history-title">📋 Licencias generadas</div>
    <div id="hist-list"></div>
  </div>

</div>

<script>
// ─── MISMA CLAVE QUE EN LA APP — NO CAMBIAR ───────────
var LIC_SECRET = 'MF2025PRO#*xK9';

function generarCodigoLicencia(phone) {
  var input = phone.trim() + LIC_SECRET;
  var hash = 0;
  for (var i = 0; i < input.length; i++) {
    var chr = input.charCodeAt(i);
    hash = ((hash << 5) - hash) + chr;
    hash |= 0;
  }
  var abs = Math.abs(hash);
  var part1 = ('0000' + (abs % 10000)).slice(-4);
  var part2 = ('0000' + (Math.floor(abs / 10000) % 10000)).slice(-4);
  return 'MFAM-' + part1 + '-' + part2;
}

var currentCode = '';
var currentPhone = '';

function generarCodigo() {
  var phone = document.getElementById('phone-input').value.trim();
  if (!phone || phone.length < 7) {
    alert('Ingresa un número de celular válido (mínimo 7 dígitos)');
    return;
  }

  var code = generarCodigoLicencia(phone);
  currentCode = code;
  currentPhone = phone;

  document.getElementById('res-phone').textContent = '📱 ' + phone;
  document.getElementById('res-code').textContent = code;

  var msg = encodeURIComponent(
    '¡Hola! 👋 Tu código de activación de MercaFam Pro es:\n\n' +
    '📱 Número: ' + phone + '\n' +
    '🔑 Código: ' + code + '\n\n' +
    '👉 Pasos para activar:\n' +
    '1. Abre la app\n' +
    '2. Ingresa tu número: ' + phone + '\n' +
    '3. Ingresa el código: ' + code + '\n' +
    '4. ¡Listo! Ya puedes usar MercaFam Pro 🛒\n\n' +
    '¿Tienes alguna duda? Responde este mensaje.'
  );
  document.getElementById('wa-link').href = 'https://wa.me/57' + phone + '?text=' + msg;

  document.getElementById('result-box').classList.add('show');

  // Save to history
  guardarHistorial(phone, code);
  renderHistorial();

  document.getElementById('phone-input').value = '';
}

function copiarCodigo() {
  var text = currentPhone + ' → ' + currentCode;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(currentCode).then(function() {
      var btn = document.querySelector('.copy-btn');
      btn.textContent = '✅ ¡Copiado!';
      setTimeout(function(){ btn.textContent = '📋 Copiar código'; }, 2000);
    });
  } else {
    var ta = document.createElement('textarea');
    ta.value = currentCode;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  }
}

function guardarHistorial(phone, code) {
  var hist = JSON.parse(localStorage.getItem('mfam_licencias') || '[]');
  // Avoid duplicates for same phone
  hist = hist.filter(function(h){ return h.phone !== phone; });
  hist.unshift({ phone: phone, code: code, date: new Date().toLocaleDateString('es-CO') });
  if (hist.length > 50) hist = hist.slice(0, 50);
  localStorage.setItem('mfam_licencias', JSON.stringify(hist));
}

function renderHistorial() {
  var hist = JSON.parse(localStorage.getItem('mfam_licencias') || '[]');
  var el = document.getElementById('hist-list');
  if (!hist.length) {
    el.innerHTML = '<div class="empty">Aún no has generado códigos</div>';
    return;
  }
  el.innerHTML = hist.map(function(h, i) {
    return '<div class="hist-item">' +
      '<div>' +
        '<div class="hist-phone">📱 ' + h.phone + ' <span style="font-size:10px;color:#2d4a6a">— ' + h.date + '</span></div>' +
        '<div class="hist-code">' + h.code + '</div>' +
      '</div>' +
      '<button class="hist-del" onclick="borrarHistorial(' + i + ')">✕</button>' +
    '</div>';
  }).join('');
}

function borrarHistorial(idx) {
  var hist = JSON.parse(localStorage.getItem('mfam_licencias') || '[]');
  hist.splice(idx, 1);
  localStorage.setItem('mfam_licencias', JSON.stringify(hist));
  renderHistorial();
}

renderHistorial();

// ─── PWA — INSTALAR COMO APP ─────────────────────────
var _deferredInstall = null;

// Manifest dinámico
(function(){
  var manifest = {
    name: 'MercaFam Licencias',
    short_name: 'MF Licencias',
    description: 'Generador privado de licencias MercaFam Pro',
    start_url: window.location.href,
    display: 'standalone',
    background_color: '#060d1a',
    theme_color: '#060d1a',
    icons: [{
      src: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="20" fill="%230a4a9e"/><text y=".9em" font-size="70" x="15">🔑</text></svg>',
      sizes: 'any',
      type: 'image/svg+xml',
      purpose: 'any maskable'
    }]
  };
  var blob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
  var url = URL.createObjectURL(blob);
  var link = document.getElementById('pwa-manifest-gen');
  if(link) link.href = url;
})();

window.addEventListener('beforeinstallprompt', function(e){
  e.preventDefault();
  _deferredInstall = e;
  document.getElementById('install-bar').classList.add('show');
});

window.addEventListener('appinstalled', function(){
  document.getElementById('install-bar').classList.remove('show');
  _deferredInstall = null;
});

function instalarApp(){
  if(_deferredInstall){
    _deferredInstall.prompt();
    _deferredInstall.userChoice.then(function(r){
      if(r.outcome === 'accepted'){
        document.getElementById('install-bar').classList.remove('show');
      }
      _deferredInstall = null;
    });
  }
}

</script>
</body>
</html>
